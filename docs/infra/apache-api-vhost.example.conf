# Exemplo de VirtualHost para a API Reserva Escolar em homologacao/producao.
# Ajuste dominio, certificados, usuario do banco, senha e origens autorizadas
# antes de habilitar no Apache.

<VirtualHost *:80>
    ServerName api-hml.reservaescolar.com.br
    ServerAlias www.api-hml.reservaescolar.com.br
    Redirect permanent / https://api-hml.reservaescolar.com.br/

    ErrorLog "logs/reserva_escolar_api_hml_80_error.log"
    CustomLog "logs/reserva_escolar_api_hml_80_access.log" combined
</VirtualHost>

<VirtualHost *:443>
    ServerName api-hml.reservaescolar.com.br
    ServerAlias www.api-hml.reservaescolar.com.br
    DocumentRoot "/var/www/reserva_escolar_api_railway/public"

    SSLEngine on
    SSLCertificateFile "/caminho/do/certificado/fullchain.pem"
    SSLCertificateKeyFile "/caminho/do/certificado/privkey.pem"

    <Directory "/var/www/reserva_escolar_api_railway/public">
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    SetEnv RESERVA_DB_HOST localhost
    SetEnv RESERVA_DB_PORT 5432
    SetEnv RESERVA_DB_NAME postgres
    SetEnv RESERVA_DB_USERNAME reserva_escolar_app
    SetEnv RESERVA_DB_PASSWORD troque-esta-senha
    SetEnv RESERVA_ALLOWED_ORIGINS "https://app-hml.reservaescolar.com.br,https://painel-hml.reservaescolar.com.br"

    ErrorLog "logs/reserva_escolar_api_hml_443_error.log"
    CustomLog "logs/reserva_escolar_api_hml_443_access.log" combined
</VirtualHost>
