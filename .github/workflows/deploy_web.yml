name: Deploy Flutter Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy_web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Flutter Web
        env:
          API_BASE_URL_RAW: ${{ vars.API_BASE_URL_PROD }}
        run: |
          API_BASE_URL="$(printf '%s' "$API_BASE_URL_RAW" | tr -d '\r\n')"

          if [ -z "$API_BASE_URL" ]; then
            echo "API_BASE_URL_PROD is empty after trimming whitespace." >&2
            exit 1
          fi

          flutter build web --release --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RESERVA_ESCOLAR }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: .
